<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDFShield — Forensic Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f1f5f9;
      --surface:       #ffffff;
      --border:        #e2e8f0;
      --text:          #0f172a;
      --text-muted:    #64748b;
      --accent:        #3b82f6;
      --accent-dark:   #1d4ed8;
      --accent-light:  #eff6ff;
      --green:         #16a34a;
      --green-light:   #f0fdf4;
      --green-border:  #86efac;
      --red:           #dc2626;
      --red-light:     #fef2f2;
      --red-border:    #fca5a5;
      --radius:        14px;
      --radius-sm:     8px;
      --shadow:        0 4px 24px rgba(15,23,42,.08);
      --transition:    .18s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Brand ─────────────────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: .5rem;
      filter: drop-shadow(0 2px 8px rgba(59,130,246,.3));
    }
    .brand h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text);
    }
    .brand p {
      margin-top: .4rem;
      color: var(--text-muted);
      font-size: .95rem;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem;
      width: 100%;
      max-width: 540px;
    }

    /* ── Drop zone ──────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      padding: 2.8rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition),
                  transform var(--transition), box-shadow var(--transition);
      position: relative;
      outline: none;
    }
    .drop-zone:hover,
    .drop-zone:focus-visible {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .drop-zone.dragover {
      border-color: var(--accent);
      border-style: solid;
      background: var(--accent-light);
      transform: scale(1.015);
      box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    }
    .drop-zone.invalid {
      border-color: var(--red);
      border-style: solid;
      background: var(--red-light);
    }

    .drop-icon {
      font-size: 2.8rem;
      line-height: 1;
      margin-bottom: 1rem;
      pointer-events: none;
    }
    .drop-primary {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      pointer-events: none;
    }
    .drop-secondary {
      margin-top: .45rem;
      font-size: .9rem;
      color: var(--text-muted);
    }
    .browse-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: inherit;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0;
    }
    .browse-btn:hover { color: var(--accent-dark); }
    .drop-hint {
      margin-top: .7rem;
      font-size: .8rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── File preview ───────────────────────────────────────── */
    .file-preview {
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1.5px solid var(--green-border);
      border-radius: var(--radius-sm);
      background: var(--green-light);
      padding: 1rem 1.25rem;
    }
    .file-preview-icon { font-size: 2rem; flex-shrink: 0; }
    .file-meta {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: .15rem;
    }
    .file-name {
      font-size: .95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .file-size { font-size: .8rem; color: var(--text-muted); }
    .remove-btn {
      background: none;
      border: 1.5px solid #cbd5e1;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      color: var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .remove-btn:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }

    /* ── Validation message ─────────────────────────────────── */
    .validation-msg {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: .88rem;
      font-weight: 500;
    }
    .validation-msg.error {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid var(--red-border);
    }
    .validation-msg.server-error {
      background: var(--red-light);
      color: var(--red);
      border: 1px solid var(--red-border);
    }

    /* ── Submit button ──────────────────────────────────────── */
    .submit-btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: .9rem 1.5rem;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition),
                  transform var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Form spacer ────────────────────────────────────────── */
    .form-stack { display: flex; flex-direction: column; gap: 1rem; }

    /* ── Footer ─────────────────────────────────────────────── */
    .page-footer {
      margin-top: 2rem;
      font-size: .8rem;
      color: var(--text-muted);
      text-align: center;
    }
    .page-footer a { color: var(--accent); text-decoration: none; }
    .page-footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 1.5rem; }
      .drop-zone { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

  <header class="brand">
    <div class="brand-icon">🛡️</div>
    <h1>PDFShield</h1>
    <p>Upload a PDF to run a full forensic authenticity analysis</p>
  </header>

  <main class="card">
    {% if error %}
    <div class="validation-msg server-error" style="margin-bottom:1rem">
      ⚠ {{ error }}
    </div>
    {% endif %}

    <form id="upload-form" action="/analyze" method="post" enctype="multipart/form-data">
      <div class="form-stack">

        <!-- Drop zone -->
        <div class="drop-zone" id="drop-zone" tabindex="0" role="button"
             aria-label="Click or drag a PDF file here to upload">
          <div class="drop-icon">📂</div>
          <p class="drop-primary">Drop your PDF here</p>
          <p class="drop-secondary">
            or
            <button type="button" class="browse-btn"
                    onclick="event.stopPropagation(); fileInput.click()">browse files</button>
          </p>
          <p class="drop-hint">PDF · max 10 MB</p>
          <input type="file" id="file-input" name="file"
                 accept=".pdf,application/pdf" hidden />
        </div>

        <!-- File preview (hidden until valid file selected) -->
        <div class="file-preview" id="file-preview" hidden>
          <div class="file-preview-icon">📄</div>
          <div class="file-meta">
            <span class="file-name" id="file-name"></span>
            <span class="file-size" id="file-size"></span>
          </div>
          <button type="button" class="remove-btn" id="remove-btn"
                  aria-label="Remove selected file">✕</button>
        </div>

        <!-- Validation feedback -->
        <div class="validation-msg error" id="validation-msg" hidden></div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submit-btn" disabled
                aria-label="Start forensic analysis">
          <span id="btn-text">Analyze Document</span>
          <span id="btn-loading" hidden style="display:flex;align-items:center;gap:.5rem">
            <span class="spinner"></span> Analyzing…
          </span>
        </button>

      </div>
    </form>
  </main>

  <footer class="page-footer">
    PDFShield v0.1 &nbsp;·&nbsp;
    <a href="/api/v1/health" target="_blank" rel="noopener">API Health</a>
  </footer>

  <script>
    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const filePreview = document.getElementById('file-preview');
    const validMsg    = document.getElementById('validation-msg');
    const submitBtn   = document.getElementById('submit-btn');
    const form        = document.getElementById('upload-form');
    const btnText     = document.getElementById('btn-text');
    const btnLoading  = document.getElementById('btn-loading');

    const MAX_BYTES = 10 * 1024 * 1024;

    /* ── Drag events ────────────────────────────────────────── */
    ['dragenter', 'dragover'].forEach(ev =>
      dropZone.addEventListener(ev, e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      })
    );
    ['dragleave', 'drop'].forEach(ev =>
      dropZone.addEventListener(ev, e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
      })
    );
    dropZone.addEventListener('drop', e => {
      const files = e.dataTransfer.files;
      if (files.length) processFile(files[0]);
    });

    /* ── Click to browse ────────────────────────────────────── */
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });

    /* ── File input change ──────────────────────────────────── */
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) processFile(fileInput.files[0]);
    });

    /* ── Process selected file ──────────────────────────────── */
    function processFile(file) {
      const isPdf = file.type === 'application/pdf' ||
                    file.name.toLowerCase().endsWith('.pdf');
      if (!isPdf)          return showError('Only PDF files are accepted.');
      if (file.size > MAX_BYTES)
        return showError(`File is too large (${fmtBytes(file.size)}). Limit: 10 MB.`);

      showSelected(file);
    }

    function showSelected(file) {
      dropZone.classList.remove('invalid');
      dropZone.style.display = 'none';
      filePreview.hidden = false;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = fmtBytes(file.size);
      validMsg.hidden = true;
      submitBtn.disabled = false;

      /* keep the file attached to the hidden input */
      try {
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
      } catch (_) { /* Safari fallback – form already has the file */ }
    }

    function showError(msg) {
      dropZone.classList.add('invalid');
      validMsg.hidden = false;
      validMsg.textContent = '⚠ ' + msg;
      submitBtn.disabled = true;
    }

    /* ── Remove selected file ───────────────────────────────── */
    document.getElementById('remove-btn').addEventListener('click', () => {
      fileInput.value = '';
      filePreview.hidden = true;
      dropZone.style.display = '';
      dropZone.classList.remove('invalid', 'dragover');
      validMsg.hidden = true;
      submitBtn.disabled = true;
    });

    /* ── Form submit → show loading state ───────────────────── */
    form.addEventListener('submit', e => {
      if (submitBtn.disabled) { e.preventDefault(); return; }
      btnText.hidden    = true;
      btnLoading.hidden = false;
      btnLoading.style.display = 'flex';
      submitBtn.disabled = true;
    });

    /* ── Utility ────────────────────────────────────────────── */
    function fmtBytes(b) {
      if (b < 1024)           return b + ' B';
      if (b < 1024 * 1024)    return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(2) + ' MB';
    }
  </script>

</body>
</html>
